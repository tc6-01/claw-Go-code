services:
  claw:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CLAW_PROVIDER=anthropic
      - CLAW_MODEL=claude-sonnet-4-5
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_CODE_API_KEY=${CLAUDE_CODE_API_KEY:-}
      - CLAUDE_CODE_BASE_URL=${CLAUDE_CODE_BASE_URL:-}
      - CLAW_API_KEYS=${CLAW_API_KEYS:-}
      - CLAW_SERVER_HOST=0.0.0.0
      - CLAW_SERVER_PORT=8080
      - CLAW_DATA_DIR=/home/claw/.claw/data
      - CLAW_SESSION_STORAGE_DIR=/home/claw/.claw/sessions
      - CLAW_LOG_LEVEL=info
      - CLAW_LOG_FORMAT=json
    volumes:
      - claw-data:/home/claw/.claw/data
      - claw-sessions:/home/claw/.claw/sessions
      - claw-skills:/home/claw/.claw/skills
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  claw-data:
  claw-sessions:
  claw-skills:
